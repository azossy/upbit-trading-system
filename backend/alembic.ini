# ============================================================
# Alembic 설정 파일
# SQLAlchemy ORM 모델의 변경사항을 DB 마이그레이션으로 관리합니다.
#
# 사용법:
#   alembic revision --autogenerate -m "변경내용"  # 마이그레이션 파일 자동 생성
#   alembic upgrade head                           # 최신 마이그레이션 적용
#   alembic downgrade -1                           # 한 단계 롤백
#   alembic history                                # 마이그레이션 히스토리 조회
#   alembic current                                # 현재 DB 버전 확인
# ============================================================

[alembic]
# ─── 마이그레이션 스크립트 경로 ───
# alembic/ 폴더에 versions/ 하위폴더에 마이그레이션 파일들이 저장됩니다.
script_location = alembic

# ─── DB 연결 URL ───
# 실제 운영에서는 .env 파일의 DATABASE_URL을 참조합니다.
# 아래 값은 env.py에서 settings.DATABASE_URL로 오버라이드됩니다.
sqlalchemy.url = postgresql+asyncpg://upbit_user:changeme@localhost:5432/upbit_trading

# ─── 마이그레이션 파일 네이밍 규칙 ───
# 예: 20260225_1200_create_users.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# ─── 타임존 ───
timezone = UTC

# ─── 소스 경로 (Python import 경로에 추가) ───
prepend_sys_path = .

# ─── 마이그레이션 버전 디렉토리 ───
version_locations = %(here)s/alembic/versions

# ─── 자동생성 시 비교 방식 ───
# compare_type=true: 컬럼 타입 변경도 감지
# compare_server_default=true: 서버 기본값 변경도 감지
[alembic:compare]
include_schemas = false


# ─── 로깅 설정 ───
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

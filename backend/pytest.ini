# ============================================================
# pytest 설정 파일
# 테스트 실행 옵션 및 플러그인 설정을 정의합니다.
# ============================================================

[pytest]

# ─── 비동기 테스트 모드 ───
# asyncio_mode = auto: 모든 async def test_* 함수에 자동으로 이벤트 루프 적용
# 수동으로 @pytest.mark.asyncio 데코레이터 없이 비동기 테스트 가능
asyncio_mode = auto

# ─── 테스트 파일 경로 ───
testpaths = tests

# ─── 기본 출력 옵션 ───
# -v: 자세한 출력 (각 테스트 이름과 결과 표시)
# --tb=short: 실패 시 짧은 트레이스백 (full보다 가독성 좋음)
addopts =
    -v
    --tb=short
    --strict-markers

# ─── 커스텀 마커 등록 ───
# 마커를 등록하면 --strict-markers 옵션에서 경고 없이 사용 가능
markers =
    asyncio: 비동기 테스트 (pytest-asyncio)
    slow: 실행 시간이 긴 테스트 (실제 API 호출 등)
    integration: 통합 테스트 (DB 연결 필요)
    unit: 단위 테스트 (외부 의존성 없음)

# ============================================================
# Nginx 리버스 프록시 설정
# - /api/* → FastAPI 백엔드 (포트 8000)
# - /ws/*  → WebSocket 백엔드
# - /*     → React 프론트엔드 (포트 3000)
# ============================================================

events {
    # 동시 연결 수 — 트레이딩 시스템 특성상 WebSocket 연결 고려
    worker_connections 1024;
}

http {
    # ─── 기본 설정 ───
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # ─── 로그 형식 ───
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    # ─── Rate Limiting 설정 ───
    # IP당 분당 60회 요청 제한 (초당 1회)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=1r/s;
    # 로그인 시도 제한 (15분당 5회)
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

    # ─── 보안 헤더 ───
    # XSS 방지, 클릭재킹 방지, MIME 스니핑 방지
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' http://localhost:8000 ws://localhost:8000 ws: wss:;" always;

    # ─── 업스트림 정의 ───
    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:3000;
    }

    # ─── HTTP 서버 (프로덕션에서는 HTTPS 리다이렉트) ───
    server {
        listen 80;
        server_name _;

        # ─── 요청 크기 제한 (파일 업로드 방지) ───
        client_max_body_size 10m;

        # ─── API 라우트 → FastAPI 백엔드 ───
        location /api/ {
            # Rate Limiting 적용 (burst 20: 순간 20건까지 허용)
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CORS는 FastAPI에서 처리하므로 nginx에서는 추가하지 않음
        }

        # ─── 로그인 API → 더 엄격한 Rate Limiting ───
        location /api/v1/auth/login {
            limit_req zone=login_limit burst=3 nodelay;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── WebSocket 라우트 → FastAPI WebSocket ───
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;  # 24시간 WebSocket 유지
        }

        # ─── 프론트엔드 → React 앱 ───
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ─── 정적 파일 캐싱 ───
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://frontend;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ─── HTTPS 서버 (SSL 인증서 설치 후 활성화) ───
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #
    #     ssl_certificate /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #
    #     # HSTS (HTTP Strict Transport Security)
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #
    #     # 위의 location 블록들을 여기에도 동일하게 복사
    # }
}
